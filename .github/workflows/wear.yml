name: wear

on:
  push:
    branches: [main]
    paths:
      - "wear/**"
      - "skill/bridge/**"
      - ".github/workflows/wear.yml"
      - ".github/scripts/wear-e2e.sh"
  pull_request:
    paths:
      - "wear/**"
      - "skill/bridge/**"
      - ".github/workflows/wear.yml"
      - ".github/scripts/wear-e2e.sh"

jobs:
  build:
    name: build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble and run unit tests
        working-directory: wear
        run: ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest
      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wear-unit-test-reports
          path: wear/app/build/reports/tests

  emulator-e2e:
    name: instrumented e2e on Wear emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skill/bridge/package-lock.json
      - name: Install bridge dependencies
        working-directory: skill/bridge
        run: npm ci
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build app and androidTest APKs before booting the emulator
        working-directory: wear
        run: ./gradlew --no-daemon :app:assembleDebug :app:assembleDebugAndroidTest
      - name: Run walking-skeleton e2e against a real bridge
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: android-wear
          arch: x86_64
          profile: wearos_large_round
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash .github/scripts/wear-e2e.sh
      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wear-instrumented-test-reports
          path: |
            wear/app/build/reports/androidTests
            bridge.log
