name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: skill/bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skill/bridge/package-lock.json
      - run: npm ci
      - run: npm test
